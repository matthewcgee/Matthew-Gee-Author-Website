<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#071e4d"/>
      <stop offset="100%" stop-color="#0d3a6e"/>
    </linearGradient>
    <linearGradient id="curve" x1="90" y1="460" x2="580" y2="175" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#1295a3"/>
      <stop offset=".55" stop-color="#1aa7a6"/>
      <stop offset="1"   stop-color="#67cfae"/>
    </linearGradient>
    <linearGradient id="divider" x1="0" y1="0" x2="0" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#1295a3" stop-opacity="0"/>
      <stop offset=".5"  stop-color="#1295a3" stop-opacity="0.6"/>
      <stop offset="1"   stop-color="#1295a3" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid texture -->
  <rect width="1200" height="630" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- ── A MARK (left side, scaled up) ── -->
  <!-- Original icon viewBox 0 0 275 255, scaled ~2.2x, translated to center left region -->
  <g transform="translate(80 65) scale(1.82)">
    <g transform="translate(24 18) scale(.86)">
      <!-- A legs in white -->
      <path d="M50 250 138 45 226 250" fill="none" stroke="#ffffff" stroke-width="40" stroke-linejoin="miter" stroke-linecap="butt"/>
      <!-- Teal gradient curve -->
      <path d="M45 217 C94 207 142 188 183 157 C216 132 239 103 260 74"
            fill="none" stroke="url(#curve)" stroke-width="20" stroke-linecap="round"/>
      <!-- Ascending dots -->
      <circle cx="62"  cy="214" r="16" fill="#1295a3"/>
      <circle cx="124" cy="194" r="16" fill="#17a5a9"/>
      <circle cx="185" cy="157" r="16" fill="#41b9a9"/>
      <circle cx="248" cy="91"  r="17" fill="#67cfae"/>
    </g>
  </g>

  <!-- Vertical divider -->
  <rect x="570" y="0" width="1" height="630" fill="url(#divider)"/>

  <!-- ── TEXT (right side) ── -->
  <!-- "Acuitas™" wordmark -->
  <text x="620" y="238"
        font-family="Avenir Next, Montserrat, Segoe UI, Arial, sans-serif"
        font-size="96" font-weight="700" letter-spacing="-1"
        fill="#ffffff">Acuitas&#8482;</text>

  <!-- Tagline -->
  <text x="624" y="294"
        font-family="Avenir Next, Montserrat, Segoe UI, Arial, sans-serif"
        font-size="22" font-weight="700" letter-spacing="5"
        fill="#67cfae">ACUITY YOU CAN ACT ON.&#8482;</text>

  <!-- Divider rule -->
  <rect x="620" y="318" width="500" height="2" rx="1" fill="rgba(255,255,255,0.15)"/>

  <!-- Subtitle -->
  <text x="622" y="368"
        font-family="Avenir Next, Montserrat, Segoe UI, Arial, sans-serif"
        font-size="28" font-weight="400" letter-spacing="0.5"
        fill="rgba(255,255,255,0.78)">Behavioral Health Acuity Dashboard</text>

  <!-- Descriptor line -->
  <text x="622" y="410"
        font-family="Avenir Next, Montserrat, Segoe UI, Arial, sans-serif"
        font-size="20" font-weight="400"
        fill="rgba(255,255,255,0.45)">Real-time acuity · Census · Staffing · Every shift.</text>
</svg>
